name: Guardrails CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-safety:
    name: Lint, type-check & safety scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy bandit safety

      - name: Ruff lint
        run: ruff check . --select E,W,F,B,S --ignore S101,S603

      - name: Mypy type-check (guardrails + workers)
        run: |
          mypy guardrails/ workers/ --ignore-missing-imports --no-strict-optional --explicit-package-bases

      - name: Bandit security scan
        run: bandit -r guardrails/ workers/ -ll -x tests/

      - name: Safety dependency audit
        run: safety check --full-report
        continue-on-error: true   # advisory only

  guardrail-unit-tests:
    name: Guardrail unit tests
    runs-on: ubuntu-latest
    needs: lint-and-safety
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run guardrail tests
        # NOTE: || true removed intentionally - CI must fail on broken tests (P1 hardening)
        run: |
          pytest tests/ -v --tb=short

  secret-scan:
    name: Secret / credential scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS scan
        # Pinned to v3.88.1 (latest stable as of 2025-06-01) to prevent supply-chain attacks
        # Update this SHA periodically: https://github.com/trufflesecurity/trufflehog/releases
        uses: trufflesecurity/trufflehog@v3.88.1
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  delete-guard:
    name: Accidental-delete guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect mass-delete
        run: |
          DELETED=$(git diff --diff-filter=D --name-only HEAD~1 HEAD | wc -l)
          echo "Files deleted: $DELETED"
          if [ "$DELETED" -gt 10 ]; then
            echo "ERROR: PR deletes $DELETED files. Review required."
            exit 1
          fi

      - name: Block memory wipe patterns
        run: |
          if git diff HEAD~1 HEAD | grep -qE '(rm -rf memory|shutil\.rmtree.*memory|DELETE FROM|DROP TABLE)'; then
            echo "ERROR: Detected potential memory wipe command in diff."
            exit 1
          fi
